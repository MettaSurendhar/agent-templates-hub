name: Add template to catalog

on:
  issues:
    types: [opened]

concurrency:
  group: add-template-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  add-template:
    if: contains(github.event.issue.labels.*.name, 'new-template')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and update README
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;

            function extract(label) {
              const re = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }

            const repoUrl = extract('Repository URL');
            const family = extract('Which family does this belong to\\?');
            const tier = extract('Tier \\(if applicable\\)');
            const description = extract('One-line description');

            if (!repoUrl.startsWith('https://github.com/')) {
              core.setFailed('Repository URL must be a github.com link.');
              return;
            }

            const familyMap = {
              'Multi-Agent Orchestrator': 'orchestrator',
              'Document Intelligence (RAG)': 'document-intel',
              'Node/Express Backend': 'node-express',
              "Other / doesn't fit an existing family": 'other',
            };
            const anchorKey = familyMap[family];
            if (!anchorKey) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: "Couldn't match this to a known family table — a maintainer will review manually."
              });
              core.setOutput('skip', 'true');
              return;
            }

            const repoName = repoUrl.replace('https://github.com/', '').replace(/\/$/, '');
            const linkText = repoName.split('/')[1];
            const row = anchorKey === 'other'
              ? `| [${linkText}](${repoUrl}) | ${description.replace(/\|/g, '\\|')} |`
              : `| ${tier || 'N/A'} | ${description.replace(/\|/g, '\\|')} | [${linkText}](${repoUrl}) |`;

            const readme = fs.readFileSync('README.md', 'utf8');
            const anchor = `<!-- TABLE:${anchorKey}:end -->`;
            if (!readme.includes(anchor)) {
              core.setFailed(`Anchor ${anchor} not found in README.md`);
              return;
            }
            fs.writeFileSync('README.md', readme.replace(anchor, `${row}\n${anchor}`));

            core.setOutput('skip', 'false');
            core.setOutput('branch', `add-template/issue-${context.issue.number}`);
            core.setOutput('repo_name', linkText);

      - name: Open PR
        if: steps.parse.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add ${{ steps.parse.outputs.repo_name }} to catalog"
          branch: ${{ steps.parse.outputs.branch }}
          title: "Add ${{ steps.parse.outputs.repo_name }} to catalog"
          body: |
            Auto-generated from #${{ github.event.issue.number }}. Review before merging.

            Closes #${{ github.event.issue.number }}
          base: main
          delete-branch: true
