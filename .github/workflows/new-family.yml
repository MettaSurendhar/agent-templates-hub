name: Scaffold new family

on:
  issues:
    types: [labeled]

concurrency:
  group: new-family-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  scaffold-new-family:
    if: >
      github.event.label.name == 'approved' &&
      contains(github.event.issue.labels.*.name, 'new-family')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HUB_AUTOMATION_PAT }}

      - name: Parse issue and prepare all file changes
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;

            function extract(label) {
              const re = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const m = body.match(re);
              let val = m ? m[1].trim() : '';
              if (val === '_No response_') val = '';
              return val;
            }

            function slugify(str) {
              return str.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            }

            const familyName = extract('Family name');
            const anchorKeyRaw = extract('Anchor key \\(lowercase, hyphenated, no spaces\\)');
            const emoji = extract('Emoji for the section heading \\(optional\\)') || '📦';
            const intro = extract('One-paragraph intro for the section');

            if (!familyName || !anchorKeyRaw || !intro) {
              core.setFailed('Family name, anchor key, and intro are all required.');
              return;
            }
            const anchorKey = anchorKeyRaw.toLowerCase().replace(/[^a-z0-9-]/g, '-');

            // --- 1. README section ---
            const readme = fs.readFileSync('README.md', 'utf8');
            const marker = '<!-- FAMILIES:end -->';
            if (!readme.includes(marker)) {
              core.setFailed('FAMILIES:end marker not found in README.md');
              return;
            }
            if (readme.includes(`TABLE:${anchorKey}:end`)) {
              core.setFailed(`A table with anchor key "${anchorKey}" already exists.`);
              return;
            }
            const section = [
              '',
              `## ${emoji} ${familyName}`,
              '',
              intro,
              '',
              '| Tier | Use it when... | Repo |',
              '| ---- | ---------------- | ---- |',
              `<!-- TABLE:${anchorKey}:end -->`,
              ''
            ].join('\n');
            fs.writeFileSync('README.md', readme.replace(marker, `${section}\n${marker}`));

            // --- 2. Wire into add-template.yml (familyMap) ---
            const wfPath = '.github/workflows/add-template.yml';
            let wf = fs.readFileSync(wfPath, 'utf8');
            if (wf.includes(`'${familyName}':`)) {
              core.warning(`"${familyName}" already present in familyMap — skipping edit.`);
            } else {
              const mapRe = /^([ \t]*)"Other \/ doesn't fit an existing family": 'other',$/m;
              const mapMatch = wf.match(mapRe);
              if (!mapMatch) {
                core.setFailed('Could not find familyMap anchor line in add-template.yml');
                return;
              }
              const indent = mapMatch[1];
              const replacement = `${indent}'${familyName}': '${anchorKey}',\n${indent}"Other / doesn't fit an existing family": 'other',`;
              wf = wf.replace(mapRe, replacement);
              fs.writeFileSync(wfPath, wf);
            }

            // --- 3. Wire into add_template.yml (dropdown option) ---
            const tmplPath = '.github/ISSUE_TEMPLATE/add_template.yml';
            let tmpl = fs.readFileSync(tmplPath, 'utf8');
            if (tmpl.includes(`"${familyName}"`)) {
              core.warning(`"${familyName}" already present in dropdown options — skipping edit.`);
            } else {
              const optRe = /^([ \t]*)- "Other \/ doesn't fit an existing family"$/m;
              const optMatch = tmpl.match(optRe);
              if (!optMatch) {
                core.setFailed('Could not find dropdown-options anchor line in add_template.yml');
                return;
              }
              const indent = optMatch[1];
              const replacement = `${indent}- "${familyName}"\n${indent}- "Other / doesn't fit an existing family"`;
              tmpl = tmpl.replace(optRe, replacement);
              fs.writeFileSync(tmplPath, tmpl);
            }

            core.setOutput('branch', `new-family/${slugify(anchorKey)}-issue-${context.issue.number}`);
            core.setOutput('family_name', familyName);
            core.setOutput('anchor_key', anchorKey);

      - name: Configure git
        run: |
          git config user.name "template-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "${{ steps.parse.outputs.branch }}"

      - name: Commit 1 — README section
        run: |
          git add README.md
          git commit -m "docs: scaffold '${{ steps.parse.outputs.family_name }}' section in README"

      - name: Commit 2 — wire up automation
        run: |
          git add .github/workflows/add-template.yml .github/ISSUE_TEMPLATE/add_template.yml
          git diff --cached --quiet || git commit -m "chore: wire up '${{ steps.parse.outputs.family_name }}' family into automation"

      - name: Push branch
        run: git push origin "${{ steps.parse.outputs.branch }}"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.HUB_AUTOMATION_PAT }}
        run: |
          gh pr create \
            --title "Scaffold new family: ${{ steps.parse.outputs.family_name }}" \
            --body "Auto-generated from #${{ github.event.issue.number }} after maintainer approval.

          Two commits to review separately:
          1. README section for the new family
          2. Wiring into \`add-template.yml\` and \`add_template.yml\` so future submissions route here automatically

          Closes #${{ github.event.issue.number }}" \
            --base main \
            --head "${{ steps.parse.outputs.branch }}"
