name: Scaffold new family

on:
  issues:
    types: [labeled]

concurrency:
  group: new-family-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  scaffold-new-family:
    if: >
      github.event.label.name == 'approved' &&
      contains(github.event.issue.labels.*.name, 'new-family')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and scaffold section
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;

            function extract(label) {
              const re = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }

            const familyName = extract('Family name');
            const anchorKeyRaw = extract('Anchor key \\(lowercase, hyphenated, no spaces\\)');
            const emoji = extract('Emoji for the section heading \\(optional\\)') || '📦';
            const intro = extract('One-paragraph intro for the section');

            const anchorKey = anchorKeyRaw.toLowerCase().replace(/[^a-z0-9-]/g, '-');
            if (!anchorKey) {
              core.setFailed('Anchor key could not be parsed.');
              return;
            }

            const readme = fs.readFileSync('README.md', 'utf8');
            const marker = '<!-- FAMILIES:end -->';
            if (!readme.includes(marker)) {
              core.setFailed('FAMILIES:end marker not found in README.md');
              return;
            }

            const section = [
              '',
              `## ${emoji} ${familyName}`,
              '',
              intro,
              '',
              '| Tier | Use it when... | Repo |',
              '| ---- | ---------------- | ---- |',
              `<!-- TABLE:${anchorKey}:end -->`,
              ''
            ].join('\n');

            fs.writeFileSync('README.md', readme.replace(marker, `${section}\n${marker}`));

            core.setOutput('branch', `new-family/issue-${context.issue.number}`);
            core.setOutput('family_name', familyName);
            core.setOutput('anchor_key', anchorKey);

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Scaffold '${{ steps.parse.outputs.family_name }}' family"
          branch: ${{ steps.parse.outputs.branch }}
          title: "Scaffold new family: ${{ steps.parse.outputs.family_name }}"
          body: |
            Auto-generated from #${{ github.event.issue.number }} after maintainer approval.

            **Manual follow-up after merging this PR:**
            Add `'${{ steps.parse.outputs.family_name }}': '${{ steps.parse.outputs.anchor_key }}'`
            to the `familyMap` in `.github/workflows/add-template.yml`, and add
            `${{ steps.parse.outputs.family_name }}` as a dropdown option in
            `.github/ISSUE_TEMPLATE/add_template.yml`.

            Closes #${{ github.event.issue.number }}
          base: main
          delete-branch: true
