name: Lint README tables

on:
  pull_request:
    paths:
      - 'README.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all anchors still present
        run: |
          for anchor in "TABLE:orchestrator:end" "TABLE:document-intel:end" "TABLE:node-express:end" "TABLE:other:end" "FAMILIES:end"; do
            if ! grep -q "<!-- $anchor -->" README.md; then
              echo "::error::Missing anchor: $anchor — did a PR delete it?"
              exit 1
            fi
          done
      - name: Check anchors are directly inside their tables
        run: |
          for anchor in "TABLE:orchestrator:end" "TABLE:document-intel:end" "TABLE:node-express:end" "TABLE:other:end"; do
            line=$(grep -n "<!-- $anchor -->" README.md | cut -d: -f1)
            prev_line=$(sed -n "$((line - 1))p" README.md)
            if [[ "$prev_line" != \|* ]]; then
              echo "::error::Anchor $anchor isn't immediately preceded by a table row (found: '$prev_line') — table is broken."
              exit 1
            fi
          done
