name: Process catalog submissions

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  add-template:
    if: contains(github.event.issue.labels.*.name, 'new-template') && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and update README
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;

            function extract(label) {
              const re = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }

            const repoUrl = extract('Repository URL');
            const family = extract('Which family does this belong to\\?');
            const tier = extract('Tier \\(if applicable\\)');
            const description = extract('One-line description');

            if (!repoUrl.startsWith('https://github.com/')) {
              core.setFailed('Repository URL must be a github.com link.');
              return;
            }

            const familyMap = {
              'Multi-Agent Orchestrator': 'orchestrator',
              'Document Intelligence (RAG)': 'document-intel',
              'Node/Express Backend': 'node-express',
              "Other / doesn't fit an existing family": 'other',
            };
            const anchorKey = familyMap[family];
            if (!anchorKey) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: "Couldn't match this to a known family table — a maintainer will review manually. If this should be its own category, consider the 'Propose a new family' template instead."
              });
              core.setOutput('skip', 'true');
              return;
            }

            const repoName = repoUrl.replace('https://github.com/', '').replace(/\/$/, '');
            const linkText = repoName.split('/')[1];
            const row = anchorKey === 'other'
              ? `| [${linkText}](${repoUrl}) | ${description.replace(/\|/g, '\\|')} |`
              : `| ${tier || 'N/A'} | ${description.replace(/\|/g, '\\|')} | [${linkText}](${repoUrl}) |`;

            const readme = fs.readFileSync('README.md', 'utf8');
            const anchor = `<!-- TABLE:${anchorKey}:end -->`;
            if (!readme.includes(anchor)) {
              core.setFailed(`Anchor ${anchor} not found in README.md`);
              return;
            }
            fs.writeFileSync('README.md', readme.replace(anchor, `${row}\n${anchor}`));

            core.setOutput('skip', 'false');
            core.setOutput('branch', `add-template/issue-${context.issue.number}`);
            core.setOutput('repo_name', linkText);

      - name: Commit
        if: steps.parse.outputs.skip == 'false'
        run: |
          git config user.name "template-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "${{ steps.parse.outputs.branch }}"
          git add README.md
          git commit -m "Add ${{ steps.parse.outputs.repo_name }} to catalog (closes #${{ github.event.issue.number }})"
          git push origin "${{ steps.parse.outputs.branch }}"

      - name: Open PR
        if: steps.parse.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.parse.outputs.branch }}
          title: 'Add ${{ steps.parse.outputs.repo_name }} to catalog'
          body: |
            Auto-generated from #${{ github.event.issue.number }}. Review before merging.
          base: main

  scaffold-new-family:
    # Only fires when a maintainer adds the "approved" label — not on issue open.
    if: >
      github.event.action == 'labeled' &&
      github.event.label.name == 'approved' &&
      contains(github.event.issue.labels.*.name, 'new-family')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and scaffold section
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;

            function extract(label) {
              const re = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }

            const familyName = extract('Family name');
            const anchorKeyRaw = extract('Anchor key \\(lowercase, hyphenated, no spaces\\)');
            const emoji = extract('Emoji for the section heading \\(optional\\)') || '📦';
            const intro = extract('One-paragraph intro for the section');

            const anchorKey = anchorKeyRaw.toLowerCase().replace(/[^a-z0-9-]/g, '-');
            if (!anchorKey) {
              core.setFailed('Anchor key could not be parsed.');
              return;
            }

            const readme = fs.readFileSync('README.md', 'utf8');
            const marker = '<!-- FAMILIES:end -->';
            if (!readme.includes(marker)) {
              core.setFailed('FAMILIES:end marker not found in README.md');
              return;
            }

            const section = `
            ## ${emoji} ${familyName}

            ${intro}

            | Tier | Use it when... | Repo |
            | ---- | ---------------- | ---- |
            <!-- TABLE:${anchorKey}:end -->
            `.replace(/^ {12}/gm, ''); // strip the JS indentation

            fs.writeFileSync('README.md', readme.replace(marker, `${section}\n${marker}`));

            core.setOutput('branch', `new-family/issue-${context.issue.number}`);
            core.setOutput('family_name', familyName);
            core.setOutput('anchor_key', anchorKey);

      - name: Commit
        run: |
          git config user.name "template-bot"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "${{ steps.parse.outputs.branch }}"
          git add README.md
          git commit -m "Scaffold '${{ steps.parse.outputs.family_name }}' family (closes #${{ github.event.issue.number }})"
          git push origin "${{ steps.parse.outputs.branch }}"

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.parse.outputs.branch }}
          title: 'Scaffold new family: ${{ steps.parse.outputs.family_name }}'
          body: |
            Auto-generated from #${{ github.event.issue.number }} after maintainer approval.

            **Manual follow-up after merging this PR:**
            To let future `add_template` submissions auto-file into this new table,
            add `'${{ steps.parse.outputs.family_name }}': '${{ steps.parse.outputs.anchor_key }}'`
            to the `familyMap` in `.github/workflows/process-template-submission.yml`,
            and add `${{ steps.parse.outputs.family_name }}` as a dropdown option in
            `.github/ISSUE_TEMPLATE/add_template.yml`. GitHub blocks the default
            token from editing workflow files itself, so this one step stays manual.
          base: main
